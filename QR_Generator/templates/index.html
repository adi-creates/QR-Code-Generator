<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Generator | URL to QR Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <main class="hero-shell d-flex align-items-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-9 col-xl-8">
                    <section class="glass-card p-4 p-md-5">
                        <div
                            class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                            <div>
                                <p class="eyebrow mb-1">Flask + Python</p>
                                <h1 class="display-title mb-0">QR Generator</h1>
                            </div>
                            <span class="badge text-bg-light px-3 py-2">Generate in milliseconds</span>
                        </div>

                        <p class="lead-copy mb-4">
                            Paste any URL, press generate, and instantly get a scannable QR code.
                        </p>

                        <div class="row g-4 align-items-start content-split">
                            <div class="col-12 col-lg-7 input-pane">
                                <form method="post" class="row g-3">
                                    <div class="col-12">
                                        <label for="url" class="form-label">Website URL</label>
                                        <input type="text" class="form-control form-control-lg" id="url" name="url"
                                            placeholder="example.com or https://example.com" value="{{ submitted_url }}"
                                            required />
                                    </div>
                                    <div class="col-12 d-grid d-sm-inline-block">
                                        <button type="submit" class="btn btn-generate btn-lg px-4">Generate QR</button>
                                    </div>
                                </form>

                                {% if error %}
                                <div class="alert alert-danger mt-4 mb-0" role="alert">
                                    {{ error }}
                                </div>
                                {% endif %}
                            </div>

                            <div class="col-12 col-lg-5 output-pane">
                                <section class="result-panel h-100">
                                    {% if qr_data_uri %}
                                    <p class="result-label mb-2">QR for:</p>
                                    <p class="result-url mb-3">{{ normalized_url }}</p>
                                    <div class="qr-frame">
                                        <img src="{{ qr_data_uri }}" alt="Generated QR Code" class="img-fluid" />
                                    </div>
                                    {% else %}
                                    <p class="result-label mb-2">Output</p>
                                    <p class="placeholder-copy mb-0">Your generated QR code will appear here.</p>
                                    {% endif %}
                                </section>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
